name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: make test

  release:
    name: build & publish binaries
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: build binaries
        working-directory: go
        run: |
          set -eu
          mkdir -p ../dist
          workdir=$(mktemp -d)
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${target%/*}"; arch="${target#*/}"
            echo "building ${os}/${arch}"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags "-s -w" -o "$workdir/mundane" ./cmd/mundane
            tar -czf "../dist/mundane_${os}_${arch}.tar.gz" -C "$workdir" mundane
            rm -f "$workdir/mundane"
          done
          cd ../dist && sha256sum ./*.tar.gz > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  publish-pypi:
    name: publish to PyPI
    runs-on: ubuntu-latest
    needs: test
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: verify tag matches pyproject version
        working-directory: python
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PY=$(grep '^version' pyproject.toml | cut -d'"' -f2)
          [ "$TAG" = "$PY" ] || { echo "tag $TAG != pyproject $PY"; exit 1; }
      - name: build sdist + wheel
        working-directory: python
        run: |
          python -m pip install --upgrade build
          python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist

  publish-npm:
    name: publish to npm
    runs-on: ubuntu-latest
    needs: test
    environment: npm
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: verify tag matches package.json version
        working-directory: typescript
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          NPM=$(node -p "require('./package.json').version")
          [ "$TAG" = "$NPM" ] || { echo "tag $TAG != package.json $NPM"; exit 1; }
      - working-directory: typescript
        run: |
          npm install
          npm run build
          npm publish --provenance
