name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-bash:
    name: lint (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: shellcheck -s sh bash/mundane bash/test/run.sh interop-tests/run.sh

  lint-python:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
        working-directory: python

  lint-ts:
    name: lint (biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
        working-directory: typescript
      - run: npx biome check src/ test/
        working-directory: typescript

  bash:
    name: bash tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y sqlite3 uuid-runtime
      - run: ./bash/test/run.sh

  python:
    name: python tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m unittest tests.test_basic -v
        working-directory: python

  typescript:
    name: typescript tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
        working-directory: typescript
      - run: npx tsc -p .
        working-directory: typescript
      - run: node --test dist/test/basic.test.js
        working-directory: typescript

  interop:
    name: cross-runtime interop
    runs-on: ubuntu-latest
    needs: [bash, python, typescript]
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y sqlite3 uuid-runtime
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
        working-directory: typescript
      - run: npx tsc -p .
        working-directory: typescript
      - run: ./interop-tests/run.sh
