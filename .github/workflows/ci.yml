name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-sh:
    name: lint (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: shellcheck -s sh install.sh bash/test/run.sh examples/smoke.sh examples/docker-volume/workflow.sh

  lint-python:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
        working-directory: python

  lint-ts:
    name: lint (biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
        working-directory: typescript
      - run: npx biome check src/ test/
        working-directory: typescript

  lint-go:
    name: lint (go vet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: go vet ./...
        working-directory: go

  go:
    name: go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: go test ./...
        working-directory: go

  sh:
    name: sh integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: go build -o mundane-bin ./cmd/mundane
        working-directory: go
      - run: ./bash/test/run.sh

  python:
    name: python tests
    # ubuntu-22.04: ubuntu-latest (24.04) no longer provides a Python 3.8
    # build via setup-python, and the package targets requires-python >=3.8.
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.8", "3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m unittest tests.test_basic -v
        working-directory: python

  typescript:
    name: typescript tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
        working-directory: typescript
      - run: npx tsc -p .
        working-directory: typescript
      - run: node --test dist/test/basic.test.js
        working-directory: typescript

  conformance:
    name: conformance (shared harness)
    runs-on: ubuntu-latest
    needs: [go, sh, python, typescript]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: go build -o mundane-bin ./cmd/mundane
        working-directory: go
      - run: go build -o conformance-driver ./cmd/conformance
        working-directory: go
      - run: npm install
        working-directory: typescript
      - run: npx tsc -p .
        working-directory: typescript
      - run: python3 conformance/run.py
        env:
          MUNDANE_BIN: go/mundane-bin

  examples:
    name: examples (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: ./examples/smoke.sh

  examples-docker:
    name: examples (docker-volume)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build image
        run: docker compose build
        working-directory: examples/docker-volume
      - name: run workflow on a volume, twice (resume from cache)
        working-directory: examples/docker-volume
        run: |
          set -e
          out=$(COOLDOWN=2s docker compose run --rm -e COOLDOWN workflow)
          echo "$out"
          echo "$out" | grep -qF "workflow complete"
          out=$(COOLDOWN=2s docker compose run --rm -e COOLDOWN workflow)
          echo "$out"
          echo "$out" | grep -qF "workflow complete"
      - name: tear down (removes the volume)
        if: always()
        working-directory: examples/docker-volume
        run: docker compose down -v
